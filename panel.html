<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Mocker Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
<div class="root">

  <!-- ── Disabled overlay ────────────────────────────────────────────────── -->
  <div id="disabledOverlay" class="disabled-overlay hidden">
    <div class="disabled-box">
      <div class="disabled-icon">⚡</div>
      <div class="disabled-title">API Mocker is off for this site</div>
      <div class="disabled-domain" id="overlayDomain"></div>
      <button id="overlayEnableBtn" class="disabled-enable-btn">Enable for this site</button>
    </div>
  </div>

  <!-- ── Tab bar ─────────────────────────────────────────────────────────── -->
  <div class="tab-bar">
    <button class="tab active" data-tab="calls">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Inspector
    </button>
    <button class="tab" data-tab="mocks">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Mocks <span id="mockCount" class="tab-badge">0</span>
    </button>
    <button class="tab" data-tab="settings" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
    <div class="tab-fill"></div>
  </div>

  <!-- ── Calls view ──────────────────────────────────────────────────────── -->
  <div id="callsView" class="view">
    <div class="workspace">

      <!-- Left: call list -->
      <div class="call-list-col" id="callListCol">

        <!-- Filter + actions -->
        <div class="call-filter-bar">
          <div class="filter-search-wrap">
            <svg class="filter-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="filterInput" type="search" class="filter-input" placeholder="Filter by URL, method, status…" />
          </div>
          <div class="call-actions-row">
            <button id="clearBtn" class="action-chip">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
              Clear
            </button>
            <button id="reloadBtn" class="action-chip">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              Reload
            </button>
            <button id="sortToggleBtn" class="action-chip action-chip--active">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>
              </svg>
              <span>Newest</span>
            </button>
            <div class="actions-spacer"></div>
            <button id="diagBtn" class="action-icon-chip" title="Diagnostic log">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </button>
            <button id="recordToggleBtn" class="action-icon-chip rec-btn" title="Recording — click to pause">
              <span class="rec-dot"></span>
            </button>
          </div>
        </div>

        <!-- Diagnostic log overlay -->
        <div id="diagOverlay" class="diag-overlay hidden">
          <div class="diag-header">
            <span class="diag-title">Diagnostic Log</span>
            <button id="diagClearBtn" class="diag-action">Clear</button>
            <button id="diagCloseBtn" class="diag-close">✕</button>
          </div>
          <div id="diagList" class="diag-list"></div>
        </div>

        <!-- Domain pill -->
        <div class="domain-pill" id="domainPill">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="domainPillText">—</span>
          <span id="callCount" class="domain-call-count">0 calls</span>
        </div>

        <div id="callList" class="call-list" tabindex="0"></div>
      </div>

      <!-- Drag handle -->
      <div class="resize-handle" id="resizeHandle">
        <span class="resize-dot"></span>
        <span class="resize-dot"></span>
        <span class="resize-dot"></span>
      </div>

      <!-- Right: detail pane -->
      <div class="detail-pane" id="detailPane">

        <div id="detailEmpty" class="detail-empty">
          <div class="detail-empty-inner">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <span>Select a call to inspect or mock it</span>
          </div>
        </div>

        <div id="detailContent" class="detail-content hidden">

          <!-- Response viewer column -->
          <div class="resp-col" id="respCol">
            <!-- Request info -->
            <div class="req-info-bar" id="detailHeader"></div>

            <!-- Sub-tabs -->
            <div class="resp-tabs-bar">
              <button class="resp-tab active" data-body-tab="response">Response</button>
              <button class="resp-tab" data-body-tab="request">Request</button>
              <button class="resp-tab resp-tab--disabled">Headers</button>
              <button class="resp-tab resp-tab--disabled">Timing</button>
              <div class="resp-tabs-spacer"></div>
              <button class="tiny-btn" id="expandAllBtn" style="display:none">Expand all</button>
              <button class="tiny-btn" id="collapseAllBtn" style="display:none">Collapse all</button>
              <button class="tiny-btn" id="copyAsCurlBtn" style="display:none">⧉ cURL</button>
            </div>

            <div class="tree-wrap" id="jsonTree"></div>
          </div>

          <!-- Second resize handle -->
          <div class="col-divider" id="colDivider">
            <span class="resize-dot resize-dot--blue"></span>
            <span class="resize-dot resize-dot--blue"></span>
            <span class="resize-dot resize-dot--blue"></span>
          </div>

          <!-- Mock editor column -->
          <div class="mock-col" id="mockCol">

            <!-- Header -->
            <div class="mock-header-bar">
              <span class="mock-col-title" id="mockColTitle">Mock Response</span>
              <span class="mock-active-badge hidden" id="mockActiveBadge">● ACTIVE</span>
              <div class="mock-header-spacer"></div>
              <button class="tiny-btn" id="resetOrigBtn" title="Reset to actual response body">↩ Original</button>
            </div>

            <!-- Fields -->
            <div class="mock-fields-bar" id="mockFieldsBar">
              <div class="mock-field">
                <span class="field-label">Status</span>
                <input type="number" id="mockStatus" value="200" min="100" max="599" class="field-input" />
              </div>
              <div class="mock-field">
                <span class="field-label">Content-Type</span>
                <input type="text" id="mockContentType" value="application/json" class="field-input field-input--wide" />
              </div>
              <div class="mock-field">
                <span class="field-label">Delay (ms)</span>
                <input type="number" id="mockDelay" value="0" min="0" class="field-input" />
              </div>
            </div>

            <!-- Body bar -->
            <div class="mock-body-bar">
              <span class="section-label">RESPONSE BODY</span>
              <div class="mock-body-spacer"></div>
              <button id="mockTreeSearchBtn" class="search-icon-btn" title="Search (Ctrl+F)">
                <svg width="11" height="11" viewBox="0 0 14 14" fill="none">
                  <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M9 9l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
              <select id="editorModeSelect" class="mode-select" title="Switch editor style">
                <option value="tree">Tree</option>
                <option value="codemirror">Editor</option>
              </select>
              <button class="tiny-btn" id="mockExpandAllBtn" style="display:none">Expand all</button>
              <button class="tiny-btn" id="mockCollapseAllBtn" style="display:none">Collapse all</button>
            </div>

            <!-- Tree search -->
            <div id="mockTreeSearch" class="tree-search-panel" style="display:none">
              <input type="text" id="mockTreeSearchInput" placeholder="Search keys and values…" />
              <span id="mockTreeSearchCount" class="search-count"></span>
              <button id="mockTreeSearchPrev" class="search-nav" title="Previous (Shift+Enter)">↑</button>
              <button id="mockTreeSearchNext" class="search-nav" title="Next (Enter)">↓</button>
              <button id="mockTreeSearchClose" class="search-close" title="Close (Esc)">✕</button>
            </div>

            <div class="tree-wrap" id="mockTree"></div>
            <div id="cmEditorWrap" class="cm-editor-wrap" style="display:none"></div>

            <div id="jsonError" class="json-error hidden">⚠ Invalid JSON — saved as plain text</div>

            <div class="mock-actions" id="mockActions"></div>
          </div>

        </div><!-- /detailContent -->
      </div><!-- /detailPane -->

    </div><!-- /workspace -->
  </div><!-- /callsView -->

  <!-- ── Mocks view ───────────────────────────────────────────────────────── -->
  <div id="mocksView" class="view hidden">
    <div class="mocks-toolbar">
      <button id="enableAllBtn" class="bulk-btn" disabled>Enable All</button>
      <button id="disableAllBtn" class="bulk-btn" disabled>Disable All</button>
      <button id="deleteAllBtn" class="bulk-btn bulk-btn-trash" disabled title="Delete all mocks">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M6 6v4M8 6v4M3 3.5l.7 7.5a.5.5 0 0 0 .5.5h5.6a.5.5 0 0 0 .5-.5L11 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Delete All
      </button>
    </div>
    <div id="mockList" class="mock-list"></div>
  </div>

</div><!-- /root -->
<script src="codemirror-bundle.js"></script>
<script src="panel.js"></script>
</body>
</html>
